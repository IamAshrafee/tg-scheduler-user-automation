<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle (Slightly rounded square) -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="white" />
  <!-- Shadow/Glow effect -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#planeGrad)" fill-opacity="0.1" stroke="url(#planeGrad)" stroke-width="2" />
  
  <!-- Paper Plane Icon -->
  <path d="M20 50 L85 20 L55 85 L45 55 Z" fill="url(#planeGrad)" />
  <path d="M45 55 L85 20 L55 85" fill="#1d4ed8" fill-opacity="0.3" />
  
  <!-- "Scheduler" Dots -->
  <circle cx="25" cy="80" r="4" fill="#3b82f6" />
  <circle cx="35" cy="80" r="4" fill="#3b82f6" fill-opacity="0.6" />
  <circle cx="45" cy="80" r="4" fill="#3b82f6" fill-opacity="0.3" />
</svg>
